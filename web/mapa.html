<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Avistamientos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mapa.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">
        <i class="fa-solid fa-paw"></i>
        <span>Mascotas Unidas</span>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="mascotas-perdidas.html">Mascotas Perdidas</a></li>
            <li><a href="mascotas-encontradas.html">Mascotas Encontradas</a></li>
            <li><a href="mapa.html" class="active">Mapa</a></li>
            <li><a href="consejos.html">Consejos</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>
    <div id="auth-container" class="auth-buttons">
        <a href="login.html" class="btn-login">Iniciar sesión</a>
        <a href="registro.html" class="btn-register">Registrarse</a>
    </div>
</header>

<section class="map-layout">
    <aside class="filters">
        <div class="filter-card">
            <h2>Filtros</h2>
            <label><input type="checkbox" id="filtro-perdidas" checked> Mascotas Perdidas</label>
            <label><input type="checkbox" id="filtro-encontradas" checked> Mascotas Encontradas</label>
            <button class="apply-btn" onclick="filtrarMapa()">Aplicar filtros</button>
            <button class="clear-btn" onclick="location.reload()">Limpiar filtros</button>
        </div>
        <div class="legend">
            <h3>Leyenda</h3>
            <p><i class="fa-solid fa-location-dot" style="color:red;"></i> Perdidas</p>
            <p><i class="fa-solid fa-location-dot" style="color:blue;"></i> Encontradas</p>
        </div>
    </aside>

    <div class="map-container">
        <div id="map" style="height: 650px; border-radius: 10px; border: 1px solid #ddd; z-index: 1;"></div>
        <div class="map-info">
            <i class="fa-solid fa-circle-info"></i> Hacé clic en los marcadores para ver más información.
        </div>
    </div>
</section>

<footer>
    <div><strong>Mascotas Unidas</strong></div>
    <div class="autor">Realizado por: Karla Elena Mamani</div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/global.js"></script>
<script src="js/mapa.js"></script>
</body>
</html>
