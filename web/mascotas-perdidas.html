<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mascotas Perdidas - Mascotas Unidas</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mascotas-perdidas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header>
    <div class="logo">
        <i class="fa-solid fa-paw"></i>
        <span>Mascotas Unidas</span>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="#" class="active">Mascotas Perdidas</a></li>
            <li><a href="mascotas-encontradas.html">Mascotas Encontradas</a></li>
            <li><a href="mapa.html">Mapa</a></li>
            <li><a href="consejos.html">Consejos</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <div id="auth-container" class="auth-buttons">
        <a href="login.html" class="btn-login">Iniciar sesión</a>
        <a href="registro.html" class="btn-register">Registrarse</a>
    </div>
</header>

<section class="page-header">
    <h1>MASCOTAS PERDIDAS</h1>
    <p>Encontrá y ayudá a que más mascotas vuelvan a casa.</p>
</section>

<section class="search-bar">
    <select id="filtro-zona">
        <option value="">Ciudad o zona (Todas)</option>
    </select>

    <select id="filtro-raza">
        <option value="">Todas las razas</option>
    </select>

    <input type="date" id="filtro-fecha">

    <button id="btn-buscar">
        <i class="fa-solid fa-magnifying-glass"></i> Buscar
    </button>
</section>

<section class="content-layout">
    
    <div class="pets-grid" id="contenedorPerdidas">
        <p style="color:#666; width:100%; text-align:center; grid-column: 1/-1;">
            <i class="fa-solid fa-spinner fa-spin"></i> Cargando mascotas perdidas...
        </p>
    </div>

    <aside class="sidebar">
        <h2>Filtros</h2>

        <label for="filtro-especie">Tipo de mascota</label>
        <select id="filtro-especie">
            <option value="TODOS">TODOS</option>
            <option value="PERRO">PERRO</option>
            <option value="GATO">GATO</option>
            <option value="AVE">AVE</option>
            <option value="CONEJO">CONEJO</option>
            <option value="OTRO">OTRO</option>
        </select>

        <label for="filtro-tamano">Tamaño</label>
        <select id="filtro-tamano">
            <option value="">Todos</option>
            <option value="Chico">Chico</option>
            <option value="Mediano">Mediano</option>
            <option value="Grande">Grande</option>
        </select>

        <label for="filtro-sexo">Sexo</label>
        <select id="filtro-sexo">
            <option value="">Todos</option>
            <option value="MACHO">Macho</option>
            <option value="HEMBRA">Hembra</option>
            <option value="NO_IDENTIFICADO">No identificado</option>
        </select>

        <button class="apply-btn" id="btn-aplicar-filtros">
            Aplicar filtros
        </button>

        <button class="clear-btn" id="btn-limpiar-filtros" style="background:#eee; border:1px solid #ccc; border-radius:8px; cursor:pointer; font-weight: 600;">
            Limpiar filtros
        </button>
    </aside>

</section>

<footer>
    <div>
        <strong>Mascotas Unidas</strong>
    </div>

    <div class="autor" style="font-weight: 600; color: #555; font-size: 14px;">
        Realizado por: Karla Elena Mamani
    </div>
</footer>

<script src="js/global.js"></script>
<script src="js/mascotas-perdidas.js"></script>
</body>

</html>
